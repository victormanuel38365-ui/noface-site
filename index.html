<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoFace</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: Arial;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* 🔥 FUNDO ANIMADO */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background: radial-gradient(circle at center, #1a001f, #000);
  overflow:hidden;
}

.bg span{
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle,#a855f7,transparent);
  border-radius:50%;
  animation: move 12s infinite alternate;
  filter:blur(80px);
}

.bg span:nth-child(2){
  left:70%;
  top:60%;
  animation-duration:15s;
}

.bg span:nth-child(3){
  left:30%;
  top:80%;
  animation-duration:18s;
}

@keyframes move{
  from{transform:translate(0,0)}
  to{transform:translate(-100px,-150px)}
}

/* 🔥 HERO */
header{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-size:55px;
  letter-spacing:6px;
  text-shadow:0 0 20px #a855f7;
}

p{
  color:#bbb;
  margin:15px 0;
}

button{
  padding:12px 25px;
  border:none;
  background:#a855f7;
  color:white;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

/* 🔥 VIDEO */
.section{
  padding:60px 20px;
  text-align:center;
}

.video{
  max-width:600px;
  margin:auto;
}

/* 🔥 CARDS */
.card{
  background:#111;
  margin:15px;
  padding:20px;
  border-radius:15px;
}

</style>
</head>

<body>

<div class="bg">
  <span></span>
  <span></span>
  <span></span>
</div>

<header>
  <div>
    <h1>NOFACE</h1>
    <p>Trap sombrio • identidade misteriosa</p>

    <button onclick="window.location.href='#video'">
      Ver vídeo
    </button>
  </div>
</header>

<div class="section" id="video">
  <h2>🔥 Vídeo destaque</h2>

  <div class="video">
    <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@noface_ofc/video/7496965157201171718"
      data-video-id="7496965157201171718"
      style="max-width: 605px; min-width: 325px;">
    </blockquote>
  </div>

  <br>

  <button onclick="window.open('https://vt.tiktok.com/ZSupsaS6e/')">
    Abrir no TikTok
  </button>
</div>

<div class="section">
  <h2>Músicas</h2>

  <div class="card">
    <h3>Sem Rastro</h3>
    <p>Frio, noturno e pesado</p>
  </div>

  <div class="card">
    <h3>Olhar Torto</h3>
    <p>Postura de rua e atitude</p>
  </div>

  <div class="card">
    <h3>Modo Luxo</h3>
    <p>Dinheiro, poder e presença</p>
  </div>
</div>

<div class="section">
  <h2>Contato</h2>

  <button onclick="window.open('https://www.tiktok.com/@noface_ofc')">
    TikTok
  </button>
</div>

<script async src="https://www.tiktok.com/embed.js"></script>

</body>
</html>
