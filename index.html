<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NoFace</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

header {
  padding: 100px 20px;
  background: linear-gradient(black, #0a0a0a);
}

h1 {
  font-size: 60px;
  letter-spacing: 5px;
}

button {
  padding: 12px 25px;
  margin-top: 20px;
  border: none;
  background: #a855f7;
  color: white;
  cursor: pointer;
  border-radius: 10px;
}

.section {
  padding: 50px 20px;
}

.card {
  background: #111;
  margin: 15px;
  padding: 25px;
  border-radius: 15px;
}

</style>
</head>

<body>

<header>
  <h1>NOFACE</h1>
  <p>Trap sombrio • identidade misteriosa</p>
  <button>Ouvir agora</button>
</header>

<div class="section">
  <h2>Músicas</h2>

  <div class="card">
    <h3>Sem Rastro</h3>
    <p>Frio, noturno e pesado</p>
  </div>

  <div class="card">
    <h3>Olhar Torto</h3>
    <p>Postura de rua e atitude</p>
  </div>

  <div class="card">
    <h3>Modo Luxo</h3>
    <p>Dinheiro, poder e presença</p>
  </div>

</div>

<div class="section">
  <h2>Contato</h2>
  <p>Coloque aqui seus links (Instagram, TikTok, Spotify)</p>
</div>

</body>
</html>
